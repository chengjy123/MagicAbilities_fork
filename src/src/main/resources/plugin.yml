name: MagicAbilities
version: '${project.version}'
main: net.trduc.magicabilities.MagicAbilities
api-version: '1.21'
commands:
  binds:
    description: Change ability binds
    usage: /<command> <change/reset> <ability> <slot>
  destination:
    description: Set destination
    usage: /<command> <dest>
  setpower:
    description: Set power (use 'random' to assign random power to player with NONE)
    usage: /<command> <player|@a> <power|random>
    permission: magic.admin
  enable:
    description: Enable powers
    usage: /<command>
  disable:
    description: Disable powers
    usage: /<command>
  powerset:
    description: Toggle or set your power on/off
    usage: /<command> [on|off]
  powersetaura:
    description: Toggle or set your power's idle aura particles on/off
    usage: /<command> [on|off]