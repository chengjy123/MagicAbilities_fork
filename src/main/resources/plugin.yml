name: MagicAbilitiesfork
version: '${project.version}'
main: net.trduc.magicabilitiesfork.MagicAbilitiesfork
api-version: '1.21'
commands:
  binds:
    description: Change ability binds
    usage: /<command> <change/reset> <ability> <slot>
  destination:
    description: Set destination
    usage: /<command> <dest>
  setpower:
    description: Set power (use 'random' to assign random power to player with NONE)
    usage: /<command> <player|@a> <power|random>
    permission: magic.admin
  enable:
    description: Enable powers
    usage: /<command>
  disable:
    description: Disable powers
    usage: /<command>
  powerset:
    description: Toggle or set your power on/off
    usage: /<command> [on|off]
  powersetaura:
    description: Toggle or set your power's idle aura particles on/off
    usage: /<command> [on|off]
  combos:
    description: Show optimized combos for a power
    usage: /<command> [power]
  powerteam:
    description: Manage power teams (create/add/remove/list/info/requests/approve/deny/invite/accept/decline)
    usage: /<command> <create|add|remove|list|info|requests|approve|deny|invite|accept|decline>
  powerteamowner:
    description: Owner/admin team management (transfer/disband/leave/coowner)
    usage: /<command> <transfer|disband|leave|coowner>
permissions:
  magic.admin:
    description: Admin-level permission for MagicAbilities
    default: op
  powerteam.owner:
    description: PowerTeam owner permission
    default: op
  powerteam.coowner:
    description: PowerTeam co-owner permission
    default: false