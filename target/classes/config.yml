config-version: 1

debug: true

# ═══ 吹雪刀技能 — XP 消耗 ═══
snowblade:
  xp:
    slash: 3
    step: 6
    drive: 9
    arctic: 12

# ═══ 修仙者 — CultivatorPower ═══
cultivator:

  # 每招的 XP 消耗（原始 XP 点数，不是等级）
  xp:
    sword-qi: 3
    sword-qi-sneak: 6
    seal: 5
    pressure: 6
    meditate: 0
    thunder-array: 8
    judgment: 15

  # 修为突破阈值（需要的等级）
  stage:
    truc-co: 10
    kim-dan: 20
    nguyen-anh: 30
    hoa-than: 40
    dai-thua: 50

  # 伤害配置
  dmg:
    sword-qi-base: 8.0
    sword-qi-per-stage: 2.0
    seal: 10.0
    pressure-max: 18.0
    thunder-sword: 14.0
    judgment-ratio: 0.45

  # 补气术
  meditate-heal-hp: 6
  meditate-reward-xp: 10

# ═══ 华山剑法 — HuaShanPower ═══
huashan:

  # 解锁每个技能槽的 XP 阈值（永久，不会因消耗 XP 而减少）
  # 使用技能不消耗 XP — 只消耗来解锁新槽位
  unlock:
    slot1: 30    # 24式梅花剑 / 梅花步
    slot2: 50    # 镇天剑 / 落花剑法
    slot3: 70    # 梅花印 / 无妄剑
    slot4: 90    # 72式梅花剑 / 百花自在剑
    slot5: 100   # 剑意（终极技）

  dmg:
    tam-tai: 5.0           # 3道剑气中的每道（x3 = 最多15）
    luc-hop-reduction: 0.35   # buff激活时受到的伤害减少百分比
    luc-hop-duration: 4.0     # 秒
    nhi-thap-tu-hit: 4.0      # 冲刺斩中的每击（5击）
    nhi-thap-tu-hits: 5
    chan-thien: 9.0
    chan-thien-stun: 1.2      # 减速效果模拟"破势"的秒数
    lac-hoa-reduction: 0.4    # 区域内敌人造成伤害减少的百分比
    lac-hoa-radius: 4.0
    lac-hoa-duration: 5.0
    mai-hoa-an: 16.0
    mai-hoa-an-armor-pierce: 0.5   # 穿透护甲的百分比
    vo-hang: 22.0
    that-thap-nhi-hit: 5.0
    that-thap-nhi-hits: 9
    bach-hoa-hit: 4.5
    bach-hoa-hits: 7
    kiem-y-radius: 6.0
    kiem-y-dmg-per-tick: 3.0
    kiem-y-duration: 4.0
    kiem-y-charge: 1.8        # 释放前蓄力的秒数

  # 吐纳神功 — 非战斗时缓慢恢复
  passive:
    regen-interval: 60        # 每次恢复之间的 tick 数
    regen-amount: 1.0         # 每次恢复的 HP
    max-hp-bonus: 2.0          # 混元功 — 最大 HP 加成（1颗心）

# ═══ DemonLordPower ═══
demonlord:
  dmg:
    inferno-blade: 16.0
    summon-soul: 9.0
    prison-tick: 4.0
    prison-release: 14.0
    devour-kill-threshold: 0.25
    devour-heal: 6.0
    devour-damage: 12.0
    shadow-step: 18.0
    judgment-base: 25.0
    judgment-hp-ratio: 0.30
    fury-aoe: 12.0

# ═══ GravityPower ═══
gravity:
  dmg:
    pull: 6.0
    push: 8.0
    crush: 10.0
    field-tick: 3.0
    collapse-base: 15.0
    collapse-hp-ratio: 0.20

# ═══ PortalPower — 虚空/奥术之门 ═══
portal:
  xp:
    gate: 20

cloud:
  xp:
    storm: 25

vampire:
  xp:
    moon: 20

poison:
  xp:
    deluge: 22

air:
  xp:
    collapse: 22

lunar:
  xp:
    domain: 0